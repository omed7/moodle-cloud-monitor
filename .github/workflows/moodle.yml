name: Moodle Cloud Monitor

on:
  workflow_dispatch:

jobs:
  scan-moodle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install aiohttp==3.9.3 beautifulsoup4==4.12.3

      - name: Run Goldilocks Scanner
        env:
          MOODLE_API_TOKEN: ${{ secrets.MOODLE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          MOODLE_API_URL: ${{ secrets.MOODLE_API_URL }}
          JSONBIN_ID: ${{ secrets.JSONBIN_ID }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
        run: python goldilocks.py
